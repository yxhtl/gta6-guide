}

<div class="page-transition-overlay covering" id="transition-overlay"><img class="overlay-art" src="{{CSS_PATH}}css/overlay-art.svg" alt="" aria-hidden="true"></div>
<script>
(function() {
  var overlay = document.getElementById('transition-overlay');
  var cleanupTimer = null;

  function doEnter() {
    if (cleanupTimer) clearTimeout(cleanupTimer);

    overlay.classList.add('covering');
    overlay.offsetHeight; // Force reflow so the covering state takes effect
    overlay.classList.remove('covering');
    overlay.classList.add('reveal');

    // Wait for animation to finish via transitionend, then clean up — won't be cut short by setTimeout
    var onDone = function() {
      overlay.removeEventListener('transitionend', onDone);
      overlay.classList.remove('reveal');
    };
    overlay.addEventListener('transitionend', onDone);
    // Fallback: force cleanup after 600ms (in case transitionend doesn't fire)
    cleanupTimer = setTimeout(function() {
      overlay.removeEventListener('transitionend', onDone);
      overlay.classList.remove('reveal');
    }, 600);
  }

  // Trigger enter animation on both first load and bfcache restore
  window.addEventListener('pageshow', function(e) {
    if (e.persisted) { overlay.classList.remove('cover'); }
    doEnter();
  });

  // Intercept internal links → slide curtain right-to-center → navigate
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('//') || link.target === '_blank') return;
    if (!href.endsWith('.html') && href !== '/' && !href.endsWith('/')) return;
    if (link.getAttribute('download') || link.getAttribute('role') === 'tab') return;

    e.preventDefault();
    if (cleanupTimer) clearTimeout(cleanupTimer);
    overlay.classList.remove('reveal');
    overlay.classList.remove('covering');
    overlay.offsetHeight;
    overlay.classList.add('cover');
    setTimeout(function() {
      window.location.href = href;
    }, 280);
  });
})();
</script>
