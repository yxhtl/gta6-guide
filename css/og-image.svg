<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 天空渐变 -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0028"/>
      <stop offset="40%" stop-color="#140048"/>
      <stop offset="100%" stop-color="#060014"/>
    </linearGradient>
    <!-- 霓虹光晕 -->
    <radialGradient id="glowPink" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ff2d95" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff2d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="30%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#b347ea" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#b347ea" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#b347ea" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="75%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.20"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <!-- 地平线光条 -->
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ff2d95" stop-opacity="0.50"/>
      <stop offset="50%" stop-color="#b347ea" stop-opacity="0.60"/>
      <stop offset="75%" stop-color="#00d4ff" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <!-- 文字霓虹发光 -->
    <filter id="neonPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 文字发光（强） -->
    <filter id="textGlowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 天空底 -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- 霓虹光晕 -->
  <rect width="1200" height="630" fill="url(#glowPink)"/>
  <rect width="1200" height="630" fill="url(#glowPurple)"/>
  <rect width="1200" height="630" fill="url(#glowCyan)"/>

  <!-- 扫描线 -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- ====== 地平线 ====== -->
  <rect x="0" y="475" width="1200" height="3" fill="url(#horizon)"/>
  <rect x="0" y="475" width="1200" height="1" fill="#b347ea" opacity="0.30"/>

  <!-- ====== 远景建筑群 ====== -->
  <g fill="#030010" opacity="0.92">
    <rect x="0" y="420" width="40" height="55"/>
    <rect x="50" y="395" width="35" height="80"/>
    <rect x="95" y="430" width="28" height="45"/>
    <rect x="135" y="380" width="38" height="95"/>
    <rect x="180" y="410" width="25" height="65"/>
    <rect x="215" y="365" width="42" height="110"/>
    <rect x="265" y="390" width="30" height="85"/>
    <rect x="305" y="415" width="35" height="60"/>
    <rect x="350" y="360" width="38" height="115"/>
    <rect x="398" y="395" width="28" height="80"/>
    <rect x="436" y="375" width="35" height="100"/>
    <!-- 中间高楼 -->
    <rect x="540" y="310" width="45" height="165"/>
    <rect x="595" y="340" width="35" height="135"/>
    <rect x="760" y="355" width="40" height="120"/>
    <rect x="810" y="375" width="35" height="100"/>
    <rect x="855" y="345" width="42" height="130"/>
    <rect x="907" y="380" width="30" height="95"/>
    <rect x="945" y="360" width="38" height="115"/>
    <rect x="993" y="395" width="35" height="80"/>
    <rect x="1038" y="370" width="40" height="105"/>
    <rect x="1085" y="410" width="30" height="65"/>
    <rect x="1125" y="385" width="35" height="90"/>
    <rect x="1170" y="405" width="30" height="70"/>
  </g>

  <!-- ====== 棕榈树（左） ====== -->
  <g transform="translate(120, 475)">
    <path d="M0,0 C-2,-80 -3,-155 -2,-220 C-2,-235 -1,-245 0,-248" stroke="#02000c" stroke-width="8" fill="none" stroke-linecap="round"/>
    <g fill="#02000c">
      <path d="M0,-248 C-45,-268 -90,-242 -100,-215 C-80,-230 -45,-248 0,-248"/>
      <path d="M0,-248 C40,-275 82,-248 92,-218 C72,-233 40,-250 0,-248"/>
      <path d="M0,-248 C-50,-295 -55,-320 -38,-325 C-45,-300 -20,-268 0,-248"/>
      <path d="M0,-248 C45,-300 50,-325 32,-330 C40,-305 15,-273 0,-248"/>
      <path d="M0,-248 C-10,-300 0,-330 2,-335 C5,-320 8,-290 0,-248"/>
    </g>
  </g>

  <!-- ====== 棕榈树（右） ====== -->
  <g transform="translate(1080, 475)">
    <path d="M0,0 C0,-70 1,-135 0,-190 C0,-205 0,-215 0,-218" stroke="#02000c" stroke-width="7" fill="none" stroke-linecap="round"/>
    <g fill="#02000c">
      <path d="M0,-218 C-40,-240 -80,-215 -90,-192 C-70,-205 -40,-218 0,-218"/>
      <path d="M0,-218 C35,-248 72,-222 82,-198 C60,-212 35,-220 0,-218"/>
      <path d="M0,-218 C-45,-265 -50,-290 -35,-295 C-42,-272 -18,-240 0,-218"/>
      <path d="M0,-218 C40,-270 45,-295 30,-300 C38,-277 14,-245 0,-218"/>
      <path d="M0,-218 C-5,-268 0,-295 0,-300 C5,-288 5,-255 0,-218"/>
    </g>
  </g>

  <!-- ====== 主标题 GTA6 ====== -->
  <text x="600" y="260" text-anchor="middle" font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif" font-size="130" font-weight="900" letter-spacing="15" fill="#ff2d95" filter="url(#textGlowPink)" opacity="0.95">GTA6</text>
  <!-- 标题外发光圈 -->
  <text x="600" y="260" text-anchor="middle" font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif" font-size="130" font-weight="900" letter-spacing="15" fill="none" stroke="#ff2d95" stroke-width="1" opacity="0.3" filter="url(#textGlowPink)">GTA6</text>

  <!-- ====== 副标题 GUIDE ====== -->
  <text x="600" y="335" text-anchor="middle" font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif" font-size="62" font-weight="900" letter-spacing="28" fill="#00d4ff" filter="url(#textGlowCyan)" opacity="0.90">GUIDE</text>

  <!-- ====== 描述行 ====== -->
  <text x="600" y="395" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="4" fill="#b347ea" filter="url(#neonPurple)" opacity="0.85">Pre-Orders · Cheats · Missions · Money &amp; More</text>

  <!-- ====== 网址 ====== -->
  <text x="600" y="555" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" letter-spacing="6" fill="#00d4ff" opacity="0.55">gta6.yxhtl.com</text>

  <!-- 底部霓虹线 -->
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#b347ea" stroke-width="1" opacity="0.12"/>
  <line x1="0" y1="595" x2="1200" y2="595" stroke="#00d4ff" stroke-width="1" opacity="0.08"/>

  <!-- 地平线霓虹光点 -->
  <circle cx="200" cy="475" r="2" fill="#ff2d95" opacity="0.6"/>
  <circle cx="350" cy="475" r="2" fill="#b347ea" opacity="0.5"/>
  <circle cx="500" cy="475" r="3" fill="#00d4ff" opacity="0.45"/>
  <circle cx="700" cy="475" r="2" fill="#ff2d95" opacity="0.55"/>
  <circle cx="900" cy="475" r="2" fill="#b347ea" opacity="0.5"/>
  <circle cx="1050" cy="475" r="2" fill="#00d4ff" opacity="0.45"/>

  <!-- VICE CITY 暗纹背景 -->
  <text x="600" y="610" text-anchor="middle" font-family="'Arial Black', Impact, sans-serif" font-size="120" font-weight="900" letter-spacing="20" fill="#ff2d95" opacity="0.04">VICE CITY</text>
</svg>
